<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPHeadline News</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<body>

<!-- Header -->
<header class="header">
  <div class="container header-flex">

    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="UPHeadline Logo">
    </a>

    <div class="search-box">
      <input type="text" placeholder="खबर खोजें...">
      <button>🔍</button>
    </div>

    <a href="#" class="live-btn">🔴 LIVE</a>

  </div>
</header>

<!-- Navbar -->
<nav class="navbar">
  <div class="container">
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">UP</a></li>
      <li><a href="#">India</a></li>
      <li><a href="#">World</a></li>
      <li><a href="#">Sports</a></li>
      <li><a href="#">Business</a></li>
    </ul>
  </div>
</nav>

<!-- Hero Banner -->
<section class="hero"></section>

<!-- Breaking News -->
<div class="breaking-bar">
  <div class="breaking-title">BREAKING</div>
  <marquee>🔥 Welcome to UPHeadline News • ताज़ा खबरें सबसे पहले</marquee>
</div>

<!-- Latest News -->
<div class="container">
  <h2 class="section-title">Latest News</h2>
  <div id="newsContainer" class="news-grid"></div>
</div>

<!-- Footer -->
<footer>
  <div class="container">
    <p>© 2026 UPHeadline News • All Rights Reserved</p>
  </div>
</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
