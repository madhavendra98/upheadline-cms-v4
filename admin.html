<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

UPHeadline CMS Admin

</title>

<link
rel="stylesheet"
href="css/style.css">

<style>

body{

background:#f5f5f5;

}

.admin-box{

max-width:900px;

margin:30px auto;

background:#fff;

padding:25px;

border-radius:10px;

box-shadow:0 5px 20px rgba(0,0,0,.15);

}

.admin-box h2{

margin-bottom:20px;

color:#c00000;

}

.admin-box input,
.admin-box textarea,
.admin-box select{

width:100%;

padding:12px;

margin-bottom:15px;

border:1px solid #ccc;

border-radius:6px;

font-size:16px;

}

.admin-box textarea{

height:180px;

resize:none;

}

.admin-box button{

width:100%;

padding:14px;

background:#c00000;

color:white;

border:none;

border-radius:6px;

font-size:18px;

cursor:pointer;

}

.admin-box button:hover{

background:#900;

}

</style>

</head>

<body>

<header class="header">

<div class="container header-flex">

<a href="index.html"
class="logo">

📰 UPHeadline CMS

</a>

</div>

</header>

<div class="admin-box">

<h2>

📝 Publish News

</h2>

<input
type="text"
id="title"
placeholder="News Title">

<textarea
id="description"
placeholder="News Description"></textarea>

<input
type="file"
id="imageFile"
accept="image/*">

<select id="category">

<option>UP News</option>

<option>India</option>

<option>World</option>

<option>Politics</option>

<option>Business</option>

<option>Sports</option>

<option>Technology</option>

</select>

<button
onclick="publishNews()">

🚀 Publish News

</button>

<hr style="margin:30px 0">

<h2>

📋 Published News

</h2>

<div id="newsList">
</div>

<hr style="margin:30px 0;">

<h2>⚙️ Website Settings</h2>

<input
type="text"
id="breakingNews"
placeholder="Breaking News Text">

<button onclick="saveBreakingNews()">

💾 Save Breaking News

</button>

</div>
<script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>

<script>
let editor;

ClassicEditor
.create(document.querySelector('#description'))
.then(newEditor => {
    editor = newEditor;
})
.catch(error => {
    console.error(error);
});
</script>
<script type="module" src="js/admin.js"></script>
</body>
</html>
