<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UPHeadline CMS Admin</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
background:#f5f5f5;
font-family:'Poppins',sans-serif;
}

.admin-box{
max-width:1100px;
margin:30px auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.12);
}

.admin-box h2{
margin-bottom:20px;
color:#c00000;
}

.admin-box input,
.admin-box textarea,
.admin-box select{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

.admin-box button{
padding:14px 20px;
background:#c00000;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.admin-box button:hover{
background:#900;
}

.dashboard-cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.dashboard-cards .card{
background:#d60000;
color:#fff;
padding:20px;
border-radius:10px;
text-align:center;
}

.dashboard-cards .card h3{
font-size:32px;
margin-bottom:5px;
}

.image-preview{
width:100%;
max-height:250px;
object-fit:cover;
border-radius:10px;
display:none;
margin-bottom:15px;
border:2px solid #ddd;
}

.options{
display:flex;
gap:20px;
margin-bottom:20px;
}

.options label{
font-weight:bold;
}

.news-card{
background:#fff;
border:1px solid #eee;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.news-card button{
width:auto;
padding:10px 16px;
margin-right:10px;
}

@media(max-width:768px){

.dashboard-cards{
grid-template-columns:1fr;
}

.options{
flex-direction:column;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<header class="header">

<div class="container header-flex">

<a href="index.html" class="logo">

<img src="images/logo.png" alt="UPHeadline Logo" height="70">

</a>

</div>

</header>

<!-- ADMIN PANEL -->

<div class="admin-box">

<h2>📝 Publish News</h2>

<!-- DASHBOARD -->

<div class="dashboard-cards">

<div class="card">
<h3 id="totalNews">0</h3>
<p>Total News</p>
</div>

<div class="card">
<h3 id="featuredNews">0</h3>
<p>Featured</p>
</div>

<div class="card">
<h3 id="breakingCount">0</h3>
<p>Breaking</p>
</div>

</div>

<!-- TITLE -->

<input
type="text"
id="title"
placeholder="📰 News Title">

<!-- CATEGORY -->

<select id="category">

<option>UP News</option>
<option>India</option>
<option>World</option>
<option>Politics</option>
<option>Business</option>
<option>Sports</option>
<option>Technology</option>
<option>Entertainment</option>

</select>

<!-- IMAGE -->

<input
type="file"
id="imageFile"
accept="image/*">

<img id="preview" class="image-preview">

<!-- CAPTION -->

<input
type="text"
id="caption"
placeholder="📷 Photo Caption">

<!-- DESCRIPTION -->

<textarea
id="description"
placeholder="Write full news here..."></textarea>

<!-- OPTIONS -->

<div class="options">

<label>
<input type="checkbox" id="featured">
⭐ Featured News
</label>

<label>
<input type="checkbox" id="breaking">
🔥 Breaking News
</label>

</div>

<!-- PUBLISH BUTTON -->

<button onclick="publishNews()">

🚀 Publish News

</button>

<hr style="margin:35px 0;">

<!-- PUBLISHED NEWS -->

<h2>📋 Published News</h2>

<div id="newsList"></div>

<hr style="margin:35px 0;">

<!-- WEBSITE SETTINGS -->

<h2>⚙️ Website Settings</h2>

<input
type="text"
id="breakingNews"
placeholder="🔥 Breaking News Text">

<button onclick="saveBreakingNews()">

💾 Save Breaking News

</button>

</div>

</script>

<!-- ADMIN JS -->

<script type="module" src="js/admin.js"></script>
<script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/7/tinymce.min.js" referrerpolicy="origin"></script>
  <script>
tinymce.init({
  selector: '#description',
  height: 450,

  menubar: true,

  plugins: [
    'advlist','autolink','lists','link','image',
    'charmap','preview','anchor','searchreplace',
    'visualblocks','code','fullscreen',
    'insertdatetime','media','table',
    'wordcount'
  ],

  toolbar:
    'undo redo | blocks | ' +
    'bold italic underline | ' +
    'forecolor backcolor | ' +
    'fontsize fontfamily | ' +
    'alignleft aligncenter alignright alignjustify | ' +
    'bullist numlist outdent indent | ' +
    'link image media table | ' +
    'removeformat code preview fullscreen'
});
</script>
  
</body>
</html>
